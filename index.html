<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>加样解放装置</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f2f2f7;
      margin: 0;
      padding: 15px;
      color: #1c1c1e;
      box-sizing: border-box;
    }
    *, *:before, *:after { box-sizing: inherit; }
    
    /* 标题栏样式 */
    .header-container { display: flex; justify-content: space-between; align-items: center; margin: 10px 0 15px 0;}
    h2 { font-size: 22px; margin: 0; font-weight: 700; }
    .settings-btn { font-size: 22px; color: #8e8e93; cursor: pointer; padding: 5px; }

    /* 导航卡片样式 */
    .nav-card {
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      padding: 12px 15px; 
      text-decoration: none; 
      background-color: #ffffff; 
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .nav-icon {
      width: 32px; height: 32px; 
      background-color: #e5e5ea; 
      border-radius: 8px; 
      display: flex; align-items: center; justify-content: center;
      margin-right: 12px;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .card-title-step { font-weight: 600; font-size: 16px; margin-bottom: 5px; color: #ff9500; }
    .card-title { font-weight: 600; font-size: 16px; margin-bottom: 5px; color: #007aff; }
    .hint { font-size: 12px; color: #8e8e93; margin-bottom: 12px; line-height: 1.3; }

    .input-group { display: flex; gap: 10px; margin-bottom: 5px; }
    .input-group div { flex: 1; }
    .input-label { font-size: 13px; color: #8e8e93; margin-bottom: 3px; display: block; font-weight: 500;}
    
    input[type="number"], select {
      width: 100%;
      padding: 10px;
      font-size: 15px;
      border: 1px solid #c7c7cc;
      border-radius: 8px;
      outline: none;
      background-color: #fafafa;
    }
    input[type="number"]:focus, select:focus { border-color: #007aff; background-color: #ffffff; }

    #settings-panel {
      display: none;
      background-color: #e5e5ea;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 15px;
    }
    .settings-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .settings-grid div { display: flex; flex-direction: column; }
    .settings-grid label { font-size: 11px; color: #8e8e93; margin-bottom: 2px;}

    .plate-grid { display: grid; grid-template-columns: 20px repeat(12, 1fr); grid-template-rows: 20px repeat(8, 1fr); gap: 2px; max-width: 400px; margin: 0 auto; }
    .grid-label { font-size: 10px; color: #8e8e93; text-align: center; line-height: 20px; font-weight: bold;}
    .well { width: 100%; padding-bottom: 100%; border-radius: 50%; border: 1px solid #e0e0e0; background-color: #fafafa; position: relative; }
    .well-content { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; font-size: 8px; color: #333; text-align: center; line-height: 1; }

    .result-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 15px; border-bottom: 1px solid #e5e5ea; }
    .result-row:last-child { border-bottom: none; font-weight: 600; color: #ff3b30; margin-top: 3px; padding-top: 10px;}
    .easter-egg { text-align: center; font-size: 12px; font-weight: bold; color: rgba(0,0,0,0.04); margin-top: 35px; letter-spacing: 2px; }
  </style>
</head>
<body>

  <div class="header-container">
    <h2>qPCR 助手</h2>
    <div class="settings-btn" onclick="toggleSettings()">⚙️</div>
  </div>

  <a href="rt.html" class="nav-card">
    <div style="display: flex; align-items: center;">
      <div class="nav-icon">
        <span style="font-size: 13px; font-weight: bold; color: #8e8e93; font-family: monospace;">RT</span>
      </div>
      <span style="font-size: 14px; font-weight: 600; color: #1c1c1e;">RT 逆转录浓度配平助手</span>
    </div>
    <span style="color: #c7c7cc; font-size: 16px; font-weight: bold;">></span>
  </a>

  <div id="settings-panel">
    <div class="settings-title">自定义单孔体积配方 (μL)</div>
    <div class="settings-grid">
      <div><label>SYBR Mix</label><input type="number" id="cfg-sybr" value="5.2" oninput="updateConfig()"></div>
      <div><label>ROX Dye</label><input type="number" id="cfg-rox" value="0.2" oninput="updateConfig()"></div>
      <div><label>cDNA</label><input type="number" id="cfg-cdna" value="1.0" oninput="updateConfig()"></div>
      <div><label>Primers F</label><input type="number" id="cfg-f" value="0.8" oninput="updateConfig()"></div>
      <div><label>Primers R</label><input type="number" id="cfg-r" value="0.8" oninput="updateConfig()"></div>
      <div><label>ddH2O</label><input type="number" id="cfg-w" value="2.2" oninput="updateConfig()"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title-step">第一步：输入参数与排板</div>
    <select id="layout-mode" onchange="updateAll()" style="margin-bottom: 10px;">
      <option value="matrix">矩阵对齐 (推荐)</option>
      <option value="stack">顺延堆叠</option>
    </select>
    <div class="input-group">
      <div><span class="input-label">样品数 (S)</span><input type="number" id="sample-input" oninput="updateAll()"></div>
      <div><span class="input-label">基因数 (G)</span><input type="number" id="gene-input" oninput="updateAll()"></div>
      <div><span class="input-label">复孔数</span><input type="number" id="reps-input" value="3" oninput="updateAll()"></div>
    </div>
    <div class="plate-grid" id="plate-grid" style="margin-top: 15px;"></div>
  </div>

  <div class="card">
    <div class="card-title">第二步：体积计算器</div>
    <div class="input-group">
      <div><span class="input-label">最终 m 孔 (EP1)</span><input type="number" id="m-input" oninput="calcVols()"></div>
      <div><span class="input-label">最终 n 孔 (EP2)</span><input type="number" id="n-input" oninput="calcVols()"></div>
    </div>
    <div style="margin-top: 15px;">
      <div class="card-title" id="title-ep1" style="font-size: 14px; color: #1c1c1e;">样品预混 EP 管</div>
      <div class="result-row"><span>cDNA 模板 (<span id="lbl-cdna">1.0</span> μL)</span> <span id="cdna-res">0.0 μL</span></div>
      <div class="result-row"><span>SYBR Mix (<span id="lbl-sybr-full">5.2</span> μL)</span> <span id="sybr-res">0.0 μL</span></div>
      <div class="result-row"><span>总体积 (此管)</span> <span id="total1-res">0.0 μL</span></div>
    </div>
    <div style="margin-top: 20px;">
      <div class="card-title" id="title-ep2" style="font-size: 14px; color: #1c1c1e;">引物预混 EP 管</div>
      <div class="result-row"><span>引物 F+R (<span id="lbl-fr">1.6</span> μL)</span> <span id="primers-res">0.0 μL</span></div>
      <div class="result-row"><span>ddH2O (<span id="lbl-w">2.2</span> μL)</span> <span id="water-res">0.0 μL</span></div>
      <div class="result-row"><span>总体积 (此管)</span> <span id="total2-res">0.0 μL</span></div>
    </div>
  </div>

  <div class="easter-egg">@louie</div>

  <script>
    let cfg = { sybr: 5.2, rox: 0.2, cdna: 1.0, f: 0.8, r: 0.8, w: 2.2 };
    const sampleColors = ['rgba(0,122,255,0.15)', 'rgba(255,149,0,0.15)', 'rgba(52,199,89,0.15)', 'rgba(255,59,48,0.15)', 'rgba(175,82,222,0.15)', 'rgba(255,214,10,0.15)'];

    document.addEventListener('DOMContentLoaded', () => { generateEmptyPlate(); updateLabels(); updateTitles(); });

    function toggleSettings() { const p = document.getElementById('settings-panel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; }
    
    function updateConfig() {
      cfg.sybr = parseFloat(document.getElementById('cfg-sybr').value) || 0;
      cfg.rox = parseFloat(document.getElementById('cfg-rox').value) || 0;
      cfg.cdna = parseFloat(document.getElementById('cfg-cdna').value) || 0;
      cfg.f = parseFloat(document.getElementById('cfg-f').value) || 0;
      cfg.r = parseFloat(document.getElementById('cfg-r').value) || 0;
      cfg.w = parseFloat(document.getElementById('cfg-w').value) || 0;
      updateLabels(); calcVols();
    }

    function updateLabels() {
      document.getElementById('lbl-cdna').innerText = cfg.cdna.toFixed(1);
      document.getElementById('lbl-sybr-full').innerText = cfg.sybr.toFixed(1);
      document.getElementById('lbl-fr').innerText = (cfg.f + cfg.r).toFixed(1);
      document.getElementById('lbl-w').innerText = cfg.w.toFixed(1);
    }

    function updateTitles() {
      const s = parseInt(document.getElementById('sample-input').value) || 0;
      const g = parseInt(document.getElementById('gene-input').value) || 0;
      document.getElementById('title-ep1').innerText = s > 0 ? `样品预混 EP 管，共 ${s} 管` : `样品预混 EP 管`;
      document.getElementById('title-ep2').innerText = g > 0 ? `引物预混 EP 管，共 ${g} 管` : `引物预混 EP 管`;
    }

    function updateAll() { generatePlateMap(); updateTitles(); }

    function generateEmptyPlate() {
      const grid = document.getElementById('plate-grid'); grid.innerHTML = '';
      for (let c = 0; c <= 12; c++) { const l = document.createElement('div'); l.className = 'grid-label'; l.innerText = c || ''; grid.appendChild(l); }
      const rows = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];
      for (let r = 0; r < 8; r++) {
        const rl = document.createElement('div'); rl.className = 'grid-label'; rl.innerText = rows[r]; grid.appendChild(rl);
        for (let c = 0; c < 12; c++) { const w = document.createElement('div'); w.className = 'well'; w.innerHTML = '<div class="well-content"></div>'; grid.appendChild(w); }
      }
    }

    function generatePlateMap() {
      const mode = document.getElementById('layout-mode').value;
      const s = parseInt(document.getElementById('sample-input').value) || 0;
      const g = parseInt(document.getElementById('gene-input').value) || 0;
      const reps = parseInt(document.getElementById('reps-input').value) || 0;
      const wells = document.querySelectorAll('.well');
      const hints = document.querySelectorAll('.well-content');
      wells.forEach(w => w.style.backgroundColor = '#fafafa');
      hints.forEach(h => h.innerText = '');

      if (s <= 0 || g <= 0 || reps <= 0) return;

      if (mode === 'matrix' && s * reps <= 12 && g <= 8) {
        for (let si = 0; si < s; si++) {
          for (let gi = 0; gi < g; gi++) {
            for (let r = 0; r < reps; r++) {
              let idx = gi * 12 + (si * reps + r);
              if (idx < 96) {
                wells[idx].style.backgroundColor = sampleColors[si % 6];
                hints[idx].innerText = `S${si+1}G${gi+1}`;
              }
            }
          }
        }
      }
    }

    function calcVols() {
      const m = parseFloat(document.getElementById('m-input').value) || 0;
      const n = parseFloat(document.getElementById('n-input').value) || 0;
      document.getElementById('cdna-res').innerText = (m * cfg.cdna).toFixed(1) + ' μL';
      document.getElementById('sybr-res').innerText = (m * cfg.sybr).toFixed(1) + ' μL';
      document.getElementById('total1-res').innerText = (m * (cfg.cdna + cfg.sybr)).toFixed(1) + ' μL';
      document.getElementById('primers-res').innerText = (n * (cfg.f + cfg.r)).toFixed(1) + ' μL';
      document.getElementById('water-res').innerText = (n * cfg.w).toFixed(1) + ' μL';
      document.getElementById('total2-res').innerText = (n * (cfg.f + cfg.r + cfg.w)).toFixed(1) + ' μL';
    }
  </script>
</body>
</html>
